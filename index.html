<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Secret Closet</title>
</head>
<body class="bg-gray-100 text-gray-900">
    <!-- Hero Section -->
    <header class="bg-blue-600 text-white p-8">
        <h1 class="text-4xl font-bold">Welcome to Secret Closet</h1>
        <p class="mt-4">Your one-stop shop for unique fashion items.</p>
    </header>
    
    <!-- Product Collections -->
    <section class="p-8">
        <h2 class="text-3xl font-semibold">Product Collections</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-4">
            <!-- Product Item -->
            <div class="bg-white rounded shadow p-4">
                <img src="/path/to/product1.jpg" alt="Product 1" class="w-full h-48 object-cover rounded mb-2">
                <h3 class="text-lg font-bold">Product 1</h3>
                <p>$49.99</p>
                <button class="bg-blue-500 text-white px-4 py-2 rounded mt-2">Add to Cart</button>
            </div>
            <!-- Add more product items similarly -->
        </div>
    </section>
    
    <!-- Accessories Section -->
    <section class="p-8">
        <h2 class="text-3xl font-semibold">Accessories</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-4">
            <!-- Accessory Item -->
            <div class="bg-white rounded shadow p-4">
                <img src="/path/to/accessory1.jpg" alt="Accessory 1" class="w-full h-48 object-cover rounded mb-2">
                <h3 class="text-lg font-bold">Accessory 1</h3>
                <p>$19.99</p>
                <button class="bg-blue-500 text-white px-4 py-2 rounded mt-2">Add to Cart</button>
            </div>
            <!-- Add more accessory items similarly -->
        </div>
    </section>
    
    <!-- VIP Signup Section -->
    <section class="bg-blue-600 text-white p-8">
        <h2 class="text-3xl font-semibold">Become a VIP!</h2>
        <p>Sign up for exclusive offers and discounts.</p>
        <form class="mt-4">
            <input type="email" class="p-2 rounded" placeholder="Enter your email">
            <button type="submit" class="bg-white text-blue-600 px-4 py-2 rounded ml-2">Sign Up</button>
        </form>
    </section>
    
    <footer class="bg-gray-800 text-white p-4 text-center">
        <p>&copy; 2026 Secret Closet. All rights reserved.</p>
    </footer>
</body>
</html>
